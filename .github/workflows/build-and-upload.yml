name: Build and Upload

on:
  push:
    branches: [staging, main]

jobs:
  build:
    # if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js application
        run: pnpm build

      - name: Archive production artifacts
        run: tar -czf boilerplate.tar.gz .next node_modules package.json

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no boilerplate.tar.gz "${{ secrets.USERNAME }}@${{ secrets.HOST }}:/flowbrand/staging/frontend"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no boilerplate.tar.gz "${{ secrets.USERNAME }}@${{ secrets.HOST }}:/flowbrand/production/frontend"

      - name: Delete zip file
        run: rm -f boilerplate.tar.gz