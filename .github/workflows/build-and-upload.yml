name: Build and Upload

on:
  push:
    branches: [dev, staging, main]

  workflow_dispatch:
jobs:
  build:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js application
        run: pnpm build

      - name: Archive production artifacts
        run: |
          tar -czf boilerplate.tar.gz .next package.json pnpm-lock.yaml

      - name: Setup SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to Dev
        if: github.ref == 'refs/heads/dev'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no boilerplate.tar.gz "$USERNAME@$HOST:/flowbrand/dev/frontend/boilerplate.tar.gz"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USERNAME@$HOST" \
            "cd /flowbrand/dev/frontend \
            && tar -xzf boilerplate.tar.gz \
            && pnpm install --prod --frozen-lockfile \
            && pm2 describe flowbrand-fe-dev > /dev/null 2>&1 \
              && pm2 restart flowbrand-fe-dev --update-env \
              || pm2 start node_modules/next/dist/bin/next --name 'flowbrand-fe-dev' --cwd /flowbrand/dev/frontend --node-args='--env-file=.env' -- start \
            && pm2 save \
            && rm -f boilerplate.tar.gz"

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no boilerplate.tar.gz "$USERNAME@$HOST:/flowbrand/staging/frontend/boilerplate.tar.gz"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USERNAME@$HOST" \
            "cd /flowbrand/staging/frontend \
            && tar -xzf boilerplate.tar.gz \
            && pnpm install --prod --frozen-lockfile \
            && pm2 describe flowbrand-fe-staging > /dev/null 2>&1 \
              && pm2 restart flowbrand-fe-staging --update-env \
              || pm2 start node_modules/next/dist/bin/next --name 'flowbrand-fe-staging' --cwd /flowbrand/staging/frontend --node-args='--env-file=.env' -- start \
            && pm2 save \
            && rm -f boilerplate.tar.gz"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no boilerplate.tar.gz "$USERNAME@$HOST:/flowbrand/production/frontend/boilerplate.tar.gz"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USERNAME@$HOST" \
            "cd /flowbrand/production/frontend \
            && tar -xzf boilerplate.tar.gz \
            && pnpm install --prod --frozen-lockfile \
            && pm2 describe flowbrand-fe-production > /dev/null 2>&1 \
              && pm2 restart flowbrand-fe-production --update-env \
              || pm2 start node_modules/next/dist/bin/next --name 'flowbrand-fe-production' --cwd /flowbrand/production/frontend --node-args='--env-file=.env' -- start \
            && pm2 save \
            && rm -f boilerplate.tar.gz"

      - name: Delete local archive
        if: always()
        run: rm -f boilerplate.tar.gz
